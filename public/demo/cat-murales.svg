<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#1a1420"/>
      <stop offset="100%" stop-color="#0a0710"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b1"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect x="220" y="300" width="360" height="200" rx="20" fill="none" stroke="#ff2fc0" stroke-width="10" filter="url(#glow)"/>
  <line x1="260" y1="360" x2="540" y2="360" stroke="#ff2fc0" stroke-width="6" opacity="0.6" filter="url(#glow)"/>
  <line x1="260" y1="420" x2="460" y2="420" stroke="#ff2fc0" stroke-width="6" opacity="0.6" filter="url(#glow)"/>
</svg>
