<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#12161e"/>
      <stop offset="100%" stop-color="#080a10"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect x="120" y="330" width="560" height="140" rx="16" fill="none" stroke="#f5fbff" stroke-width="6" opacity="0.5"/>
  <text x="400" y="440" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="96" letter-spacing="8" fill="#f5fbff" filter="url(#glow)">OPEN</text>
</svg>
